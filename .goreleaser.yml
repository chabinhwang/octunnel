version: 2

project_name: octunnel

before:
  hooks:
    - go mod tidy

builds:
  - binary: octunnel
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: chabinhwang
      name: homebrew-tap
    homepage: "https://github.com/chabinhwang/octunnel"
    description: "Expose OpenCode server via Cloudflare Tunnel"
    license: "MIT"
    install: |
      bin.install "octunnel"
    test: |
      system "#{bin}/octunnel", "--help"

release:
  github:
    owner: chabinhwang
    name: octunnel
